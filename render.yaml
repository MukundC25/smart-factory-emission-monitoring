services:
  - type: web
    name: smart-factory-api
    runtime: python
    pythonVersion: "3.9"
    plan: free
    autoDeploy: false
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements-render.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.9"
      - key: ENVIRONMENT
        value: production
      - key: PYTHONPATH
        value: .
