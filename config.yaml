project:
  name: smart-factory-emission-monitoring
  country: India

paths:
  factories_raw: data/raw/factories/factories.csv
  pollution_raw: data/raw/pollution/pollution_readings.csv
  pollution_processed: data/processed/pollution_clean.csv
  processed_dataset: data/processed/ml_dataset.parquet
  recommendations: data/output/recommendations.csv
  dashboard: data/output/dashboard.html
  pollution_heatmap: data/output/pollution_heatmap.html
  model: models/pollution_impact_model.pkl
  scaler: models/scaler.pkl
  model_report: models/model_report.json
  log_file: data/output/pipeline.log
  # Place a curated Kaggle CSV here to activate offline backfill
  kaggle_backfill: data/raw/pollution/kaggle_backfill.csv

ingestion:
  timeout_seconds: 15
  max_retries: 2
  backoff_base_seconds: 2.0
  rate_limit_seconds: 0.5
  min_factory_records: 50
  # Number of days of history to collect from live APIs
  pollution_lookback_days: 365
  # Source priority executed in order; remove an entry to skip it
  pollution_sources:
    - openaq
    - cpcb
    - kaggle_backfill
  cities:
    - Delhi
    - Mumbai
    - Pune
    - Bengaluru
    - Chennai
    - Hyderabad
    - Kolkata
    - Ahmedabad
    - Surat
    - Jaipur
    - Lucknow
    - Kanpur
    - Patna
    - Varanasi
    - Nagpur
    - Bhopal
    - Indore
    - Visakhapatnam
    - Coimbatore

apis:
  overpass_url: https://overpass-api.de/api/interpreter
  openaq_url: https://api.openaq.org/v3
  # data.gov.in CPCB air-quality resource ID (public; no auth needed for listed resources)
  datagov_base_url: https://api.data.gov.in/resource
  datagov_cpcb_resource_id: 3b01bcb8-0b14-4abf-b6f2-c1bfd384ba69

validation:
  haversine_threshold_km: 50.0
  pm25_min: 0.0
  pm25_max: 500.0
  pm10_min: 0.0
  pm10_max: 600.0
  co_min: 0.0
  co_max: 50.0
  no2_min: 0.0
  no2_max: 400.0
  so2_min: 0.0
  so2_max: 400.0
  o3_min: 0.0
  o3_max: 300.0

ml:
  random_state: 42
  n_estimators: 300
  test_size: 0.15
  val_size: 0.15
  target_column: pollution_impact_score
  pollution_weights:
    pm25: 0.35
    pm10: 0.2
    no2: 0.15
    so2: 0.1
    co: 0.1
    o3: 0.1

risk_bands:
  low_max: 3.0
  medium_max: 6.0

heatmap:
  tile_provider: "CartoDB positron"
  zoom_start: 6
  radius: 25
  blur: 15
  min_opacity: 0.4
  max_zoom: 18
  gradient:
    "0.2": "#00FF00"
    "0.4": "#FFFF00"
    "0.6": "#FFA500"
    "0.8": "#FF0000"
    "1.0": "#800080"
